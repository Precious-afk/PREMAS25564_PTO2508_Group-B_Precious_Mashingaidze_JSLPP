      <!-- Header -->
      <header class="header">
        <!-- Mobile Logo (with dropdown trigger) -->
        <button id="mobile-menu-btn" class="mobile-logo-btn">
          <div class="logo">
            <div class="logo-icon">
              <div class="logo-bar logo-bar-1"></div>
              <div class="logo-bar logo-bar-2"></div>
              <div class="logo-bar logo-bar-3"></div>
            </div>
            <span class="logo-text">kanban</span>
          </div>
          <svg class="chevron-down" width="10" height="7" viewBox="0 0 10 7" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L5 5L9 1" stroke="#635FC7" stroke-width="2"/>
          </svg>
        </button>

        <!-- Desktop Logo (when sidebar is hidden) -->
        <div id="header-logo" class="header-logo hidden">
          <div class="logo">
            <div class="logo-icon">
              <div class="logo-bar logo-bar-1"></div>
              <div class="logo-bar logo-bar-2"></div>
              <div class="logo-bar logo-bar-3"></div>
            </div>
            <span class="logo-text">kanban</span>
          </div>
        </div>

        <!-- Board Title -->
        <h1 class="board-title">Launch Career</h1>

        <!-- Add New Task Button -->
        <button id="add-task-btn" class="add-task-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.368 12V7.344H12V4.632H7.368V0H4.656V4.632H0V7.344H4.656V12H7.368Z" fill="white"/>
          </svg>
          <span class="add-task-text">Add New Task</span>
        </button>
      </header>

      <!-- Board Area -->
      <main id="board" class="board">
        <!-- Loading State -->
        <div id="loading-state" class="loading-state">
          <div class="spinner"></div>
          <p>Loading tasks...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-state hidden">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="#EA5555" stroke-width="2"/>
            <path d="M12 7V13" stroke="#EA5555" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="17" r="1" fill="#EA5555"/>
          </svg>
          <p class="error-message">Failed to load tasks</p>
          <p id="error-details" class="error-details"></p>
          <button id="retry-btn" class="retry-btn">Try Again</button>
        </div>

        <!-- Columns Container -->
        <div id="columns-container" class="columns-container hidden">
          <!-- TODO Column -->
          <div class="column" data-status="todo">
            <div class="column-header">
              <div class="column-dot todo-dot"></div>
              <h2 class="column-title">TODO (<span class="task-count">0</span>)</h2>
            </div>
            <div class="tasks-list" data-status="todo"></div>
          </div>

          <!-- DOING Column -->
          <div class="column" data-status="doing">
            <div class="column-header">
              <div class="column-dot doing-dot"></div>
              <h2 class="column-title">DOING (<span class="task-count">0</span>)</h2>
            </div>
            <div class="tasks-list" data-status="doing"></div>
          </div>

          <!-- DONE Column -->
          <div class="column" data-status="done">
            <div class="column-header">
              <div class="column-dot done-dot"></div>
              <h2 class="column-title">DONE (<span class="task-count">0</span>)</h2>
            </div>
            <div class="tasks-list" data-status="done"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

      </div>
    </div>
  </div>

  <!-- Task Modal (Add/Edit) -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">Add New Task</h2>
        <button id="modal-close-btn" class="modal-close-btn" aria-label="Close modal">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="12.728" width="3" height="18" rx="1.5" transform="rotate(45 12.728 0)" fill="#828FA3"/>
            <rect y="2.12109" width="3" height="18" rx="1.5" transform="rotate(-45 0 2.12109)" fill="#828FA3"/>
          </svg>
        </button>
      </div>

      <form id="task-form" class="task-form">
        <input type="hidden" id="task-id" value="">

        <div class="form-group">
          <label for="task-title-input" class="form-label">Title</label>
          <input type="text" id="task-title-input" class="form-input" placeholder="e.g. Take coffee break" required>
        </div>

        <div class="form-group">
          <label for="task-description-input" class="form-label">Description</label>
          <textarea id="task-description-input" class="form-textarea" placeholder="e.g. It's always good to take a break. This 15 minute break will recharge the batteries a little." rows="4"></textarea>
        </div>

        <div class="form-group">
          <label for="task-status-select" class="form-label">Status</label>
          <select id="task-status-select" class="form-select">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div class="form-group">
          <label for="task-priority-select" class="form-label">Priority</label>
          <select id="task-priority-select" class="form-select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <button type="submit" id="task-submit-btn" class="submit-btn">Create Task</button>
      </form>

      <button id="task-delete-btn" class="delete-btn hidden">Delete Task</button>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content delete-modal-content">
      <h2 class="delete-modal-title">Delete this task?</h2>
      <p class="delete-modal-message">Are you sure you want to delete the "<span id="delete-task-name"></span>" task? This action cannot be reversed.</p>
      <div class="delete-modal-actions">
        <button id="confirm-delete-btn" class="confirm-delete-btn">Delete</button>
        <button id="cancel-delete-btn" class="cancel-delete-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
